server {
    listen 80;
    server_name empanel.leono.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/everithing_manager_acme;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name empanel.leono.shop;

    ssl_certificate /etc/letsencrypt/live/empanel.leono.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/empanel.leono.shop/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}